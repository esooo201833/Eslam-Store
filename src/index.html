<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Eslam Store - Premium E-Commerce | Luxury Shopping Experience</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Discover luxury products at Eslam Store. Shop premium electronics, clothing, and accessories with exclusive deals and fast shipping. Your destination for high-end shopping.">
  <meta name="keywords" content="luxury store, premium shopping, electronics, clothing, accessories, online shopping, e-commerce, fashion, gadgets">
  <meta name="author" content="Eslam Store">
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eslamstore.com/">
  <meta property="og:title" content="Eslam Store - Premium E-Commerce">
  <meta property="og:description" content="Discover luxury products at Eslam Store. Shop premium electronics, clothing, and accessories with exclusive deals.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://eslamstore.com/">
  <meta property="twitter:title" content="Eslam Store - Premium E-Commerce">
  <meta property="twitter:description" content="Discover luxury products at Eslam Store. Shop premium electronics, clothing, and accessories with exclusive deals.">
  <meta property="twitter:image" content="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://eslamstore.com/">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <!-- CSP -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:* ws://localhost:* https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:* https://js.stripe.com https:; style-src 'self' 'unsafe-inline' http://localhost:* https:; img-src 'self' data: https: http://localhost:* https://images.unsplash.com; connect-src 'self' http://localhost:* ws://localhost:* https: https://api.stripe.com; font-src 'self' data: http://localhost:* https:; frame-src 'self' https: https://js.stripe.com https://hooks.stripe.com; media-src 'self' data: https: http://localhost:*;">
  
  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Eslam Store",
    "url": "https://eslamstore.com/",
    "description": "Premium e-commerce store offering luxury electronics, clothing, and accessories",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://eslamstore.com/products?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Eslam Store",
    "url": "https://eslamstore.com/",
    "logo": "https://eslamstore.com/logo.png",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+1-555-123-4567",
      "contactType": "customer service",
      "availableLanguage": "English"
    },
    "sameAs": [
      "https://facebook.com/eslamstore",
      "https://instagram.com/eslamstore",
      "https://twitter.com/eslamstore"
    ]
  }
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
